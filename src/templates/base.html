<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Project name{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', path='css/custom.css') }}" rel="stylesheet">
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    {% block head %}{% endblock %}
  </head>

  <body class="bg-gray-50 min-h-screen">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
      <div class="max-w-7xl mx-auto px-4">
        <div class="flex justify-between h-16">
          <div class="flex items-center">
            <a href="{{ url_for('home') }}" class="flex items-center space-x-2">
              <i class="fas fa-quote-left text-blue-600 text-2xl"></i>
              <span class="text-xl font-bold text-gray-800">Project</span>
            </a>
          </div>
          <div class="flex items-center space-x-4">
            {% if user %}
            {% if user.is_admin and user.is_active %}
            <a href="{{ url_for('admin_dashboard') }}"
              class="text-gray-700 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">
              <i class="fas fa-cog mr-1"></i>Admin
            </a>
            {% endif %}
            <div class="relative" x-data="{ open: false }">
              <button @click="open = !open"
                class="flex items-center text-gray-700 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">
                <i class="fas fa-user mr-1"></i>{{ user.username }}
                <i class="fas fa-chevron-down ml-1"></i>
              </button>
              <div x-show="open" @click.away="open = false"
                class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 z-50">
                <a href="{{ url_for('profile') }}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                  <i class="fas fa-user-edit mr-2"></i>Profile
                </a>
                <button onclick="logout()" type="button"
                  class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                  <i class="fas fa-sign-out-alt mr-2"></i>Logout
                </button>
              </div>
            </div>
            {% else %}
            <a href="{{ url_for('login') }}"
              class="text-gray-700 hover:text-blue-600 px-3 py-2 rounded-md text-sm font-medium">
              <i class="fas fa-sign-in-alt mr-1"></i>Login
            </a>
            <a href="{{ url_for('register') }}"
              class="bg-blue-600 text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-blue-700">
              <i class="fas fa-user-plus mr-1"></i>Register
            </a>
            {% endif %}
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
      {% block content %}{% endblock %}
    </main>

    <!-- Flash Messages -->
    {% if messages %}
    <div class="fixed top-20 right-4 z-50" x-data="{ show: true }" x-show="show"
      x-init="setTimeout(() => show = false, 5000)">
      {% for message in messages %}
      <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-2">
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %}

    <!-- Scripts -->
    <script>
      // CSRF token for forms
      function getCSRFToken() {
        return document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';
      }

      // Logout function
      async function logout() {
        try {
          // Clear localStorage tokens
          localStorage.removeItem('access_token');
          localStorage.removeItem('refresh_token');
          localStorage.removeItem('token_expires_at');

          // Clear cookies
          document.cookie = 'access_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
          document.cookie = 'refresh_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';

          // Call API logout to clear server-side session
          try {
            const response = await fetch('{{ url_for("api_logout") }}', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              }
            });
          } catch (apiError) {
            // API logout failed, continuing with redirect
          }

          // Redirect to login UI page (/ui/login)
          const loginUrl = '{{ url_for("login") }}';

          // Ensure we're going to the UI login page
          if (!loginUrl.includes('/ui/login')) {
            window.location.replace('{{ url_for("login") }}');
          } else {
            // Try multiple redirect methods
            try {
              window.location.replace(loginUrl);
            } catch (replaceError) {
              window.location.href = loginUrl;
            }
          }
        } catch (error) {
          // Fallback: redirect to login UI page
          window.location.href = '{{ url_for("login") }}';
        }
      }

      // Token refresh function
      async function refreshAccessToken() {
        const refreshToken = localStorage.getItem('refresh_token');
        if (!refreshToken) {
          return false;
        }

        try {
          const response = await fetch('{{ url_for("api_refresh") }}', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ refresh_token: refreshToken })
          });

          if (response.ok) {
            const data = await response.json();
            localStorage.setItem('access_token', data.access_token);
            localStorage.setItem('token_expires_at', Date.now() + (data.expires_in * 1000));
            return true;
          } else {
            // Refresh token is invalid, logout user
            logout();
            window.location.href = '{{ url_for("login") }}';
            return false;
          }
        } catch (error) {
          logout();
          window.location.href = '{{ url_for("login") }}';
          return false;
        }
      }

      // Check if token needs refresh and refresh if necessary
      async function checkAndRefreshToken() {
        const tokenExpiresAt = localStorage.getItem('token_expires_at');
        if (!tokenExpiresAt) {
          return false;
        }

        const expiresAt = parseInt(tokenExpiresAt);
        const now = Date.now();
        const timeUntilExpiry = expiresAt - now;

        // Refresh token if it expires in the next 5 minutes
        if (timeUntilExpiry < 5 * 60 * 1000) {
          return await refreshAccessToken();
        }

        return true;
      }

      // Auto-refresh token every 5 minutes
      setInterval(checkAndRefreshToken, 5 * 60 * 1000);

      // API helper
      async function apiCall(url, options = {}) {
        // Check and refresh token if needed before making request
        await checkAndRefreshToken();

        const token = localStorage.getItem('access_token');
        const defaultOptions = {
          headers: {
            'Content-Type': 'application/json',
            ...(token && { 'Authorization': `Bearer ${token}` })
          }
        };

        const response = await fetch(url, { ...defaultOptions, ...options });

        if (response.status === 401) {
          // Try to refresh token once more
          const refreshed = await refreshAccessToken();
          if (refreshed) {
            // Retry the request with new token
            const newToken = localStorage.getItem('access_token');
            const retryOptions = {
              ...defaultOptions,
              headers: {
                ...defaultOptions.headers,
                'Authorization': `Bearer ${newToken}`
              }
            };
            return await fetch(url, { ...retryOptions, ...options });
          } else {
            // Refresh failed, redirect to login
            window.location.href = '{{ url_for("login") }}';
            return;
          }
        }

        return response;
      }
    </script>
  </body>

</html>
