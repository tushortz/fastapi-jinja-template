{% extends "base.html" %}

{% block title %}Record Attendance{% endblock %}
{% block page_title %}Record Attendance{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="bg-white shadow rounded-lg">
    <div class="px-6 py-4 border-b border-gray-200">
      <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-gray-900">Record Attendance</h1>
        <a href="{{ url_for('attendance_list') }}"
           class="text-gray-600 hover:text-gray-800">
          <i class="fas fa-arrow-left mr-2"></i>Back to Records
        </a>
      </div>
    </div>

    <form id="attendanceForm" class="p-6 space-y-6">
      <!-- Member Information -->
      <div class="bg-gray-50 p-4 rounded-lg">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">Member Information</h2>
        <div>
          <label for="member_id" class="block text-sm font-medium text-gray-700 mb-1">Member ID *</label>
          <input type="text" id="member_id" name="member_id" required
                 placeholder="Enter member ID..."
                 class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>

      <!-- Service Information -->
      <div class="bg-gray-50 p-4 rounded-lg">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">Service Information</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="attendance_date" class="block text-sm font-medium text-gray-700 mb-1">Date *</label>
            <input type="date" id="attendance_date" name="attendance_date" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label for="attendance_type" class="block text-sm font-medium text-gray-700 mb-1">Service Type *</label>
            <select id="attendance_type" name="attendance_type" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">Select Service Type</option>
              <option value="sunday_service">Sunday Service</option>
              <option value="wednesday_service">Wednesday Service</option>
              <option value="prayer_meeting">Prayer Meeting</option>
              <option value="bible_study">Bible Study</option>
              <option value="youth_meeting">Youth Meeting</option>
              <option value="children_church">Children Church</option>
              <option value="choir_rehearsal">Choir Rehearsal</option>
              <option value="special_event">Special Event</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div>
            <label for="service_time" class="block text-sm font-medium text-gray-700 mb-1">Service Time</label>
            <input type="text" id="service_time" name="service_time"
                   placeholder="e.g., 9:00 AM"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label for="status" class="block text-sm font-medium text-gray-700 mb-1">Attendance Status *</label>
            <select id="status" name="status" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">Select Status</option>
              <option value="present">Present</option>
              <option value="absent">Absent</option>
              <option value="late">Late</option>
              <option value="excused">Excused</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Additional Information -->
      <div class="bg-gray-50 p-4 rounded-lg">
        <h2 class="text-lg font-semibold text-gray-900 mb-4">Additional Information</h2>
        <div>
          <label for="notes" class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
          <textarea id="notes" name="notes" rows="3"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="Any additional notes about the attendance..."></textarea>
        </div>
      </div>

      <!-- Form Actions -->
      <div class="flex justify-end space-x-3 pt-6 border-t border-gray-200">
        <a href="{{ url_for('attendance_list') }}"
           class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 transition-colors">
          Cancel
        </a>
        <button type="submit"
                class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors">
          <i class="fas fa-save mr-2"></i>Record Attendance
        </button>
      </div>
    </form>
  </div>
</div>

<script>
// Set default date to today
document.getElementById('attendance_date').value = new Date().toISOString().split('T')[0];

document.getElementById('attendanceForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const formData = new FormData(this);
  const data = Object.fromEntries(formData.entries());

  // Remove empty fields
  Object.keys(data).forEach(key => {
    if (data[key] === '') {
      delete data[key];
    }
  });

  try {
    const response = await apiCall('/attendance/', {
      method: 'POST',
      body: JSON.stringify(data)
    });

    if (response.ok) {
      const attendance = await response.json();
      window.location.href = '/attendance/list';
    } else {
      const error = await response.json();
      alert('Error recording attendance: ' + (error.detail || 'Unknown error'));
    }
  } catch (error) {
    console.error('Error:', error);
    alert('Error recording attendance. Please try again.');
  }
});
</script>
{% endblock %}
